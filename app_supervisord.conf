[supervisord]
nodaemon=true


;[unix_http_server]
;file = /tmp/supervisor.sock
;chmod = 0777
;chown= nobody:nogroup


;[rpcinterface:supervisor]
;supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface


[program:nginx]
command=/usr/sbin/nginx
startsecs = 5
stdout_events_enabled = true
stderr_events_enabled = true


[program:rabbitmq]
command=/usr/sbin/rabbitmq-server


[program:iso_worker]
directory=/app
command=celery worker -A iso.tasks -l info
autostart=true
autorestart=true
stdout_logfile = /app/logs/celery/celery_stdout.log
stderr_logfile = /app/logs/celery/celery_stderr.log

[program:app_v1_server]
directory=/
command=python3.6 -m gunicorn -b 127.0.0.1:5001 app_v1.app:app
autostart=true
autorestart=true
stdout_logfile=/app/logs/celery/app_v1_server_stdout.log
stderr_logfile=/app/logs/celery/app_v1_server_stderr.log

[program:app_v1_worker]
directory=/
command=celery -A app_v1.app:celery_app worker -l info
autostart=true
autorestart=true
stdout_logfile=/app/logs/celery/app_v1_stdout.log
stderr_logfile=/app/logs/celery/app_v1_stderr.log


[program:iso_rabbitmq]
command=/opt/rabbitmq.sh
autostart=true
autorestart=false
startsecs = 4
startretries = 1
redirect_stdout=false 
redirect_stderr=false 
