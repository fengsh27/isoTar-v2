{% import 'enrichment_analysis/macros/enrich_input.html' as enrich_macro %}

<div id="enrich_analysis_results"></div>

<!-- Modal -->
<div class="modal fade" id="enrich_statistics_modal" tabindex="-1" role="dialog" aria-labelledby="enrich_statistics_modal_label" aria-hidden="true">
  	<div class="modal-dialog modal-lg" role="document">
    	<div class="modal-content"  style="width: 1000px">
      	<div class="modal-header">
        		<h5 class="modal-title" id="enrich_statistics_modal_label"></h5>
        		<button type="button" class="close" data-dismiss="modal" aria-label="Close">
          		<span aria-hidden="true">&times;</span>
        		</button>
      	</div>
      	<div class="modal-body">
      		<div id="enrich_statistics_modal_content"></div>
      	</div>
      	<div class="modal-footer">
        		<button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      	</div>
   	</div>
  	</div>
</div>

<script>
	$(function() {
	 	get_enrichment_analysis_data();
	});
	
	function get_enrichment_analysis_data() {
		var csrf_token = $('meta[name=_csrf_token]').attr('content');
		
		if (checkVariableExistance(csrf_token)) {
  			
  			$.ajax({
      		url: '/get_enrichment_analysis_results',
      		beforeSend: function(xhr, settings) {
      			if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
          			xhr.setRequestHeader("X-CSRFToken", csrf_token);
      			}
  				},
  				data: {
					analysis_type: 'single'				
  				},
  				type: 'POST',
   			dataType: 'html',
   			success: function(response) {  
       			if (response !== null) {
       				$('div#enrich_analysis_results').html(response);
       			}
   			},
   			error: function(error) {
   				var res = $.parseJSON(error.responseText);
   				var error_code = parseInt(error.status, 10);
   				var msg = '';

   				if(error_code === 400)
   					msg = ': <i>' + res.error_msg + '</i> Please reload the page.';
   				else if( error_code === 405) {
   					msg = ': <i>' + res.error_msg + '</i>';
   				}
   						
       			modal_error_notification('An error occurred' + msg);
   			}
  			});
  		}
	}

</script>
